
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1.5rem 0}
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.top-bar h2{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary)}
.pipeline{display:flex;align-items:center;gap:0;margin-bottom:2rem;overflow-x:auto;padding-bottom:2px}
.pip{flex:1;min-width:100px;text-align:center}
.pip-box{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 6px;font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);cursor:pointer;transition:all .15s}
.pip-box.active{background:var(--color-background-primary);color:var(--color-text-primary);border:1.5px solid #185FA5;font-weight:500}
.pip-box.done{color:#0F6E56;border-color:#1D9E75;background:#E1F5EE}
.pip-arr{color:var(--color-text-secondary);font-size:14px;padding:0 4px;flex-shrink:0}
.step-area{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem}
.step-hdr{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.step-num{width:26px;height:26px;border-radius:50%;background:#185FA5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.step-title{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.step-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem;line-height:1.5}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem 1rem}
.stat-lbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono)}
.stat-val.ok{color:#0F6E56}
.stat-val.warn{color:#BA7517}
.chk-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1.25rem}
.chk-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--color-text-primary)}
.chk-row span.lbl{color:var(--color-text-secondary);flex:1}
.chk-row span.res{font-weight:500;color:#0F6E56;font-family:var(--font-mono);font-size:12px}
.chk-row span.res.blue{color:#185FA5}
.ic{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.ic.ok{background:#E1F5EE;color:#0F6E56}
.ic.info{background:#E6F1FB;color:#185FA5}
.ic.warn{background:#FAEEDA;color:#BA7517}
.divider{height:0.5px;background:var(--color-border-tertiary);margin:1rem 0}
.tag{display:inline-block;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:4px;font-size:11px;padding:2px 8px;margin:2px;font-family:var(--font-mono);color:var(--color-text-secondary)}
.tag.tgt{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4}
.tag.enc{background:#EAF3DE;color:#27500A;border-color:#C0DD97}
.enc-table{width:100%;font-size:12px;border-collapse:collapse;margin-top:.5rem}
.enc-table td{padding:5px 8px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}
.enc-table td:last-child{font-family:var(--font-mono);color:#185FA5;font-weight:500}
.enc-table tr:last-child td{border-bottom:none}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-lbl{font-size:12px;color:var(--color-text-primary);min-width:155px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--color-background-secondary);border-radius:3px;height:12px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:#185FA5}
.bar-pct{font-size:11px;color:var(--color-text-secondary);min-width:38px;text-align:right;font-family:var(--font-mono)}
.chart-wrap{position:relative;width:100%;height:220px;margin-top:.75rem}
.nav-btns{display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end}
.nav-btns button{font-size:13px;padding:7px 18px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer}
.nav-btns button.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.before-after{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.ba-box{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:.75rem 1rem}
.ba-box h4{font-size:11px;color:var(--color-text-secondary);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em}
.code-snip{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:.75rem 1rem;font-family:var(--font-mono);font-size:12px;color:var(--color-text-primary);line-height:1.7;margin-top:.75rem;white-space:pre}
.progress{display:flex;gap:4px;margin-bottom:1.5rem}
.prog-dot{flex:1;height:4px;border-radius:2px;background:var(--color-border-tertiary)}
.prog-dot.done{background:#1D9E75}
.prog-dot.active{background:#185FA5}
</style>

<div class="wrap">
<h2 class="sr-only">Data preprocessing simulation for chatbot interaction systematic literature review dataset</h2>

<div class="top-bar">
  <i class="ti ti-database" aria-hidden="true" style="font-size:20px;color:#185FA5"></i>
  <h2>Data preprocessing simulation</h2>
  <span class="pill">55 papers · 24 columns</span>
</div>

<div class="progress" id="prog"></div>

<div class="pipeline" id="pipeline"></div>

<div id="step-area" class="step-area"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const steps = [
  {label:"Load data", icon:"ti-upload"},
  {label:"Duplicates", icon:"ti-copy"},
  {label:"Missing values", icon:"ti-alert-circle"},
  {label:"Data types", icon:"ti-adjustments"},
  {label:"Encoding", icon:"ti-transform"},
  {label:"EDA", icon:"ti-chart-bar"},
  {label:"Summary", icon:"ti-check"}
];

let current = 0;
let chartInst = null;

function renderPipeline() {
  const pl = document.getElementById('pipeline');
  pl.innerHTML = steps.map((s,i) => {
    const cls = i < current ? 'done' : i === current ? 'active' : '';
    return `${i>0?'<div class="pip-arr">→</div>':''}
    <div class="pip"><div class="pip-box ${cls}" onclick="goto(${i})">
      <i class="ti ${s.icon}" aria-hidden="true" style="font-size:15px;display:block;margin-bottom:3px"></i>
      ${s.label}
    </div></div>`;
  }).join('');

  const prog = document.getElementById('prog');
  prog.innerHTML = steps.map((_,i)=>`<div class="prog-dot ${i<current?'done':i===current?'active':''}"></div>`).join('');
}

function goto(i) { current=i; renderStep(); renderPipeline(); }

const industryMap = {
  'Banking':0,'Cybersecurity':1,'Digital Marketing':2,'E-Commerce':3,
  'Education':4,'General':5,'General/NLP':6,'Healthcare':7,
  'Multi-domain':8,'Retail':9,'Services':10,'Technology':11,'Tourism':12
};

const industryDist = {'E-Commerce':12,'Retail':9,'General':8,'Banking':6,'Multi-domain':5,'Technology':4,'Education':3,'Tourism':2,'Digital Marketing':2,'General/NLP':1,'Healthcare':1,'Services':1,'Cybersecurity':1};
const yearDist = {2018:1,2020:1,2021:2,2022:4,2023:4,2024:7,2025:14,2026:22};
const featureFreq = {
  'Response_Accuracy':51,'Reliability':46,'Anthropomorphism':38,'High_Task_Complexity':44,
  'Social_Presence':28,'Personalization':26,'Prior_Experience':34,'Digital_Literacy':27,
  'Trust':23,'Privacy_Concern':25,'Ease_of_Use':22,'Transparency':12,'Sensitive_Industry':9
};

function destroyChart() {
  if (chartInst) { chartInst.destroy(); chartInst = null; }
}

function renderStep() {
  destroyChart();
  const area = document.getElementById('step-area');

  const stepContents = [
    // 0: Load data
    `<div class="step-hdr"><div class="step-num">1</div><div class="step-title">Load the dataset</div></div>
    <p class="step-sub">Read the binary-coded literature matrix from the Excel file. The dataset contains 55 rows (papers) and 24 columns (variables).</p>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-lbl">Rows (papers)</div><div class="stat-val">55</div></div>
      <div class="stat-card"><div class="stat-lbl">Columns</div><div class="stat-val">24</div></div>
      <div class="stat-card"><div class="stat-lbl">Binary columns</div><div class="stat-val">21</div></div>
      <div class="stat-card"><div class="stat-lbl">Text columns</div><div class="stat-val">3</div></div>
    </div>
    <div class="divider"></div>
    <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:.5rem">Column groups</p>
    <div>
      <span class="tag">Paper_ID</span><span class="tag">Year</span><span class="tag">Industry</span>
      <span class="tag">Quantitative</span><span class="tag">Qualitative</span><span class="tag">Mixed</span>
      <span class="tag">Small_Sample</span><span class="tag">Medium_Sample</span><span class="tag">Large_Sample</span>
      <span class="tag">Response_Accuracy</span><span class="tag">Reliability</span><span class="tag">Personalization</span>
      <span class="tag">Ease_of_Use</span><span class="tag">Transparency</span><span class="tag">Social_Presence</span>
      <span class="tag">Anthropomorphism</span><span class="tag">Trust</span><span class="tag">Privacy_Concern</span>
      <span class="tag">Prior_Experience</span><span class="tag">Digital_Literacy</span><span class="tag">High_Task_Complexity</span>
      <span class="tag">Sensitive_Industry</span><span class="tag tgt">Satisfaction</span><span class="tag tgt">Continued_Use</span>
    </div>
    <div class="code-snip">df = pd.read_excel("Chatbot_Binary_Dataset.xlsx",
              sheet_name="Binary_Coded_Dataset",
              header=1)
print(df.shape)  # (55, 24)</div>`,

    // 1: Duplicates
    `<div class="step-hdr"><div class="step-num">2</div><div class="step-title">Check for duplicate rows</div></div>
    <p class="step-sub">Scan for any rows that are exact copies of another. Duplicates would skew the model by over-representing certain studies.</p>
    <div class="before-after">
      <div class="ba-box"><h4>Before</h4><div style="font-size:13px;color:var(--color-text-primary)">55 rows total</div><div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px">Unchecked</div></div>
      <div class="ba-box"><h4>After</h4><div style="font-size:13px;color:#0F6E56;font-weight:500">55 rows retained</div><div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px">0 duplicates removed</div></div>
    </div>
    <div class="chk-list">
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Duplicate rows detected</span><span class="res">0 found</span></div>
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Rows after deduplication</span><span class="res">55 / 55</span></div>
      <div class="chk-row"><span class="ic info">i</span><span class="lbl">Each paper has a unique Paper_ID (P1–P55)</span><span class="res blue">Verified</span></div>
    </div>
    <div class="code-snip">duplicates = df.duplicated().sum()
print(f"Duplicates: {duplicates}")  # 0

df.drop_duplicates(inplace=True)
print(f"Rows after: {len(df)}")    # 55</div>`,

    // 2: Missing values
    `<div class="step-hdr"><div class="step-num">3</div><div class="step-title">Handle missing values</div></div>
    <p class="step-sub">Check every column for NaN (null) values and apply the appropriate fill strategy. Since this dataset was built from scratch, there are no missing values — but we still verify and apply safe defaults.</p>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-lbl">Total cells</div><div class="stat-val">1,320</div></div>
      <div class="stat-card"><div class="stat-lbl">Missing before</div><div class="stat-val warn">0</div></div>
      <div class="stat-card"><div class="stat-lbl">Missing after</div><div class="stat-val ok">0</div></div>
      <div class="stat-card"><div class="stat-lbl">Fill strategy</div><div class="stat-val" style="font-size:14px">3 rules</div></div>
    </div>
    <div class="divider"></div>
    <div class="chk-list">
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Binary cols (21) — fill NaN with <code>0</code> (feature absent)</span><span class="res">Applied</span></div>
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Industry — fill NaN with <code>"Unknown"</code></span><span class="res">Applied</span></div>
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Year — fill NaN with column median</span><span class="res">Applied</span></div>
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Final missing value count</span><span class="res">0 / 1,320</span></div>
    </div>
    <div class="code-snip">binary_cols = [c for c in df.columns
               if c not in ['Paper_ID','Year','Industry']]

for col in binary_cols:
    df[col] = pd.to_numeric(df[col], errors='coerce')
               .fillna(0).astype(int)

df['Industry'].fillna('Unknown', inplace=True)
df['Year'] = pd.to_numeric(df['Year'], errors='coerce')
              .fillna(df['Year'].median())

print(df.isnull().sum().sum())  # 0</div>`,

    // 3: Data types
    `<div class="step-hdr"><div class="step-num">4</div><div class="step-title">Verify and fix data types</div></div>
    <p class="step-sub">Ensure every column has the correct data type. ML models require numeric input — text or mixed types will cause errors.</p>
    <div class="chk-list">
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Paper_ID</span><span class="res blue">string (identifier)</span></div>
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Year</span><span class="res blue">int64</span></div>
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Industry</span><span class="res blue">string → will encode</span></div>
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">All 21 binary columns</span><span class="res blue">int64 (0 or 1)</span></div>
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Satisfaction (target)</span><span class="res blue">int64 (0 or 1)</span></div>
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Continued_Use (target)</span><span class="res blue">int64 (0 or 1)</span></div>
    </div>
    <div class="divider"></div>
    <div style="margin-bottom:.5rem">
      <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:.4rem">Target variable class counts</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="ba-box"><h4>Satisfaction</h4>
          <div style="font-size:13px"><span style="color:#0F6E56;font-weight:500">1 (yes) → 40 papers</span></div>
          <div style="font-size:13px"><span style="color:#A32D2D;font-weight:500">0 (no) → 15 papers</span></div>
        </div>
        <div class="ba-box"><h4>Continued Use</h4>
          <div style="font-size:13px"><span style="color:#0F6E56;font-weight:500">1 (yes) → 43 papers</span></div>
          <div style="font-size:13px"><span style="color:#A32D2D;font-weight:500">0 (no) → 12 papers</span></div>
        </div>
      </div>
    </div>
    <div class="code-snip">print(df.dtypes)
# Paper_ID     object
# Year         int64
# Industry     object
# Quantitative int64
# ...all binary cols → int64
# Satisfaction int64
# Continued_Use int64</div>`,

    // 4: Encoding
    `<div class="step-hdr"><div class="step-num">5</div><div class="step-title">Label encoding — Industry column</div></div>
    <p class="step-sub">The Industry column contains text (e.g. "Banking", "Retail"). ML models only understand numbers, so we convert each unique category to a numeric code using Label Encoding.</p>
    <div class="before-after">
      <div class="ba-box"><h4>Before</h4><div style="font-size:13px;font-family:var(--font-mono);color:var(--color-text-primary)">"E-Commerce"<br>"Banking"<br>"Retail"<br>"General"</div></div>
      <div class="ba-box"><h4>After (Industry_Encoded)</h4><div style="font-size:13px;font-family:var(--font-mono);color:#185FA5">3<br>0<br>9<br>5</div></div>
    </div>
    <div class="divider"></div>
    <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:.4rem">Full encoding map</p>
    <table class="enc-table">
      ${Object.entries(industryMap).map(([k,v])=>`<tr><td>${k}</td><td>→ ${v}</td></tr>`).join('')}
    </table>
    <div class="code-snip">from sklearn.preprocessing import LabelEncoder

le = LabelEncoder()
df['Industry_Encoded'] = le.fit_transform(df['Industry'])

# mapping: {'Banking':0, 'E-Commerce':3, 'Retail':9 ...}</div>`,

    // 5: EDA
    `<div class="step-hdr"><div class="step-num">6</div><div class="step-title">Exploratory data analysis</div></div>
    <p class="step-sub">Visualise the cleaned data to understand patterns before modelling. Choose a chart below.</p>
    <div style="display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap">
      <button onclick="showEDA('freq')" id="eda-freq" style="font-size:12px;padding:5px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer">Feature frequency</button>
      <button onclick="showEDA('ind')" id="eda-ind" style="font-size:12px;padding:5px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer">Industry distribution</button>
      <button onclick="showEDA('year')" id="eda-year" style="font-size:12px;padding:5px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer">Year trend</button>
      <button onclick="showEDA('target')" id="eda-target" style="font-size:12px;padding:5px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer">Target balance</button>
    </div>
    <div class="chart-wrap"><canvas id="edaChart" role="img" aria-label="Exploratory data analysis chart">EDA visualisation.</canvas></div>`,

    // 6: Summary
    `<div class="step-hdr"><div class="step-num">7</div><div class="step-title">Preprocessing complete</div></div>
    <p class="step-sub">All steps finished. The dataset is clean, encoded, and ready for the next stage (feature selection and ML modelling).</p>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-lbl">Papers</div><div class="stat-val ok">55</div></div>
      <div class="stat-card"><div class="stat-lbl">Duplicates</div><div class="stat-val ok">0</div></div>
      <div class="stat-card"><div class="stat-lbl">Missing values</div><div class="stat-val ok">0</div></div>
      <div class="stat-card"><div class="stat-lbl">Encoded cols</div><div class="stat-val ok">1</div></div>
    </div>
    <div class="divider"></div>
    <div class="chk-list">
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Data loaded</span><span class="res">55 rows × 24 cols</span></div>
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Duplicates removed</span><span class="res">0 removed</span></div>
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Missing values handled</span><span class="res">0 remaining</span></div>
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Data types corrected</span><span class="res">all int64 / string</span></div>
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">Industry label encoded</span><span class="res">13 categories → 0–12</span></div>
      <div class="chk-row"><span class="ic ok">✓</span><span class="lbl">EDA completed</span><span class="res">distributions verified</span></div>
    </div>
    <div class="divider"></div>
    <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:.5rem">Final columns ready for ML</p>
    <div>
      <span class="tag enc">Industry_Encoded</span>
      <span class="tag enc">Quantitative</span><span class="tag enc">Qualitative</span><span class="tag enc">Mixed</span>
      <span class="tag enc">Response_Accuracy</span><span class="tag enc">Reliability</span><span class="tag enc">Personalization</span>
      <span class="tag enc">Ease_of_Use</span><span class="tag enc">Transparency</span><span class="tag enc">Social_Presence</span>
      <span class="tag enc">Anthropomorphism</span><span class="tag enc">Trust</span><span class="tag enc">Privacy_Concern</span>
      <span class="tag enc">Prior_Experience</span><span class="tag enc">Digital_Literacy</span><span class="tag enc">High_Task_Complexity</span>
      <span class="tag tgt">Satisfaction (target)</span><span class="tag tgt">Continued_Use (target)</span>
    </div>`
  ];

  area.innerHTML = stepContents[current] + `
    <div class="nav-btns">
      ${current>0?`<button onclick="prev()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back</button>`:''}
      ${current<steps.length-1?`<button class="primary" onclick="next()">Next <i class="ti ti-arrow-right" aria-hidden="true"></i></button>`:'<button class="primary" style="opacity:.5;cursor:default">Done</button>'}
    </div>`;

  if (current === 5) showEDA('freq');
}

let edaChart = null;
function showEDA(type) {
  ['freq','ind','year','target'].forEach(t => {
    const b = document.getElementById('eda-'+t);
    if (b) b.style.background = t===type ? '#185FA5' : 'var(--color-background-secondary)';
    if (b) b.style.color = t===type ? '#fff' : 'var(--color-text-primary)';
    if (b) b.style.borderColor = t===type ? '#185FA5' : 'var(--color-border-secondary)';
  });

  if (edaChart) { edaChart.destroy(); edaChart = null; }
  const ctx = document.getElementById('edaChart');
  if (!ctx) return;

  if (type === 'freq') {
    const sorted = Object.entries(featureFreq).sort((a,b)=>a[1]-b[1]);
    edaChart = new Chart(ctx, {
      type:'bar',
      data:{labels:sorted.map(x=>x[0].replace(/_/g,' ')),datasets:[{label:'Papers studying this feature',data:sorted.map(x=>x[1]),backgroundColor:'#185FA5',borderWidth:0,borderRadius:3}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{max:55,title:{display:true,text:'Number of papers (out of 55)'},grid:{color:'rgba(0,0,0,0.05)'}},y:{grid:{display:false},ticks:{font:{size:11}}}}}
    });
  } else if (type === 'ind') {
    const sorted = Object.entries(industryDist).sort((a,b)=>b[1]-a[1]);
    edaChart = new Chart(ctx, {
      type:'bar',
      data:{labels:sorted.map(x=>x[0]),datasets:[{label:'Papers',data:sorted.map(x=>x[1]),backgroundColor:'#1D9E75',borderWidth:0,borderRadius:3}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{font:{size:11},maxRotation:40,autoSkip:false},grid:{display:false}}}}
    });
  } else if (type === 'year') {
    edaChart = new Chart(ctx, {
      type:'line',
      data:{labels:Object.keys(yearDist),datasets:[{label:'Papers',data:Object.values(yearDist),borderColor:'#185FA5',backgroundColor:'rgba(24,95,165,0.08)',fill:true,tension:0.3,pointBackgroundColor:'#185FA5',pointRadius:5}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.05)'}},x:{grid:{display:false}}}}
    });
  } else if (type === 'target') {
    edaChart = new Chart(ctx, {
      type:'bar',
      data:{
        labels:['Satisfaction = 0','Satisfaction = 1','Continued Use = 0','Continued Use = 1'],
        datasets:[{label:'Papers',data:[15,40,12,43],backgroundColor:['#E24B4A','#1D9E75','#E24B4A','#1D9E75'],borderWidth:0,borderRadius:3}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:55,title:{display:true,text:'Number of papers'},grid:{color:'rgba(0,0,0,0.05)'}},x:{grid:{display:false}}}}
    });
  }
}

function next() { if (current < steps.length-1) { current++; renderStep(); renderPipeline(); } }
function prev() { if (current > 0) { current--; renderStep(); renderPipeline(); } }

renderPipeline();
renderStep();
</script>
